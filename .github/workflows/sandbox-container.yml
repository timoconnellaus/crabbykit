name: Sandbox container CI

on:
  push:
    branches: [main]
    paths:
      - "packages/infra/cloudflare-sandbox/container/**"
      - "packages/runtime/agent-bundle/src/bundle/**"
      - "packages/runtime/agent-bundle/package.vendored.json"
      - "packages/capabilities/tavily-web-search/src/client.ts"
      - "packages/capabilities/tavily-web-search/src/schemas.ts"
      - "packages/capabilities/tavily-web-search/package.vendored.json"
      - "scripts/check-sandbox-dockerfile.mjs"
      - ".github/workflows/sandbox-container.yml"
  pull_request:
    paths:
      - "packages/infra/cloudflare-sandbox/container/**"
      - "packages/runtime/agent-bundle/src/bundle/**"
      - "packages/runtime/agent-bundle/package.vendored.json"
      - "packages/capabilities/tavily-web-search/src/client.ts"
      - "packages/capabilities/tavily-web-search/src/schemas.ts"
      - "packages/capabilities/tavily-web-search/package.vendored.json"
      - "scripts/check-sandbox-dockerfile.mjs"
      - ".github/workflows/sandbox-container.yml"

jobs:
  dockerfile-guard:
    name: Pre-build guard (tasks 6.7, 6.8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Run Dockerfile guard
        run: bun scripts/check-sandbox-dockerfile.mjs

  container-build:
    name: Build sandbox container (task 6.7)
    runs-on: ubuntu-latest
    needs: dockerfile-guard
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/infra/cloudflare-sandbox/container/Dockerfile
          push: false
          load: true
          tags: claw-sandbox:ci
      - name: Verify INTEGRITY.json is present and non-empty in the built image (task 6.8)
        run: |
          docker create --name claw-sandbox-ci-probe claw-sandbox:ci >/dev/null
          docker cp claw-sandbox-ci-probe:/opt/claw-sdk/INTEGRITY.json /tmp/INTEGRITY.json
          docker rm claw-sandbox-ci-probe >/dev/null
          if [ ! -s /tmp/INTEGRITY.json ]; then
            echo "INTEGRITY.json missing or empty in built image" >&2
            exit 1
          fi
          entries=$(jq 'keys | length' /tmp/INTEGRITY.json)
          echo "INTEGRITY.json contains $entries entries"
          if [ "$entries" -lt 1 ]; then
            echo "INTEGRITY.json has no entries" >&2
            exit 1
          fi
