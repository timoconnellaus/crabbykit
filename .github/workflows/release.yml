name: Release

# Release fires AFTER the CI workflow finishes on main. CI gates the
# full verify + container-build pipeline, so passing CI is the prereq
# for publishing.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Version or publish packages
    # Only run when the upstream CI run succeeded on a push to main —
    # skip for PR-triggered CI runs and for failed / cancelled runs.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun x changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
