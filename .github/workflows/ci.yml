name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Test with coverage
        run: bun run test:coverage
      - name: Build
        run: bun run build
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: packages/*/*/coverage/
          if-no-files-found: ignore
          retention-days: 14

  dockerfile-guard:
    name: Sandbox Dockerfile guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run Dockerfile guard
        run: bun scripts/check-sandbox-dockerfile.mjs

  container-build:
    name: Build sandbox container
    runs-on: ubuntu-latest
    needs: dockerfile-guard
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/infra/cloudflare-sandbox/container/Dockerfile
          push: false
          load: true
          tags: claw-sandbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify INTEGRITY.json is present and non-empty
        run: |
          docker create --name claw-sandbox-ci-probe claw-sandbox:ci >/dev/null
          docker cp claw-sandbox-ci-probe:/opt/claw-sdk/INTEGRITY.json /tmp/INTEGRITY.json
          docker rm claw-sandbox-ci-probe >/dev/null
          if [ ! -s /tmp/INTEGRITY.json ]; then
            echo "INTEGRITY.json missing or empty in built image" >&2
            exit 1
          fi
          entries=$(jq 'keys | length' /tmp/INTEGRITY.json)
          echo "INTEGRITY.json contains $entries entries"
          if [ "$entries" -lt 1 ]; then
            echo "INTEGRITY.json has no entries" >&2
            exit 1
          fi
